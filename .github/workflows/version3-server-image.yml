name: Build Version.3 Server Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/v1-intranet
    paths:
      - Dockerfile
      - .dockerignore
      - server/version3-local-server.mjs
      - tools/verify-version3-production-env.mjs
      - .github/workflows/version3-server-image.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: version3-server-image
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/ethicsjayden31/bonsung-version3-server

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify production environment example
        env:
          NODE_ENV: production
          VERSION3_SERVER_HOST: 0.0.0.0
          VERSION3_LOCAL_SERVER_PASSWORD: replace-with-safe-ci-password
          VERSION3_ALLOWED_ORIGINS: https://ethicsjayden31.github.io
          VERSION3_LOCAL_DATA_FILE: /data/version3-data.json
          VERSION3_SESSION_TTL_HOURS: 12
        run: node tools/verify-version3-production-env.mjs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Version.3 server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
