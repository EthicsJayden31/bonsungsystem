name: Verify External Version.3 Server

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "External HTTPS Version.3 server URL"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: version3-external-verify
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release URL shape
        env:
          VERSION3_API_BASE_URL: ${{ inputs.server_url }}
        run: pnpm verify:version3-release

      - name: Verify external server contract
        env:
          VERSION3_SERVER_VERIFY_BASE_URL: ${{ inputs.server_url }}
        run: pnpm verify:version3-server

