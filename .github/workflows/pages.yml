name: Deploy GitHub Pages Preview

on:
  push:
    branches:
      - main
      - codex/v1-intranet
      - codex/role-dashboards
  pull_request:
    branches:
      - codex/v1-intranet
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check browser JavaScript syntax
        run: |
          node --check pages-preview/config.js
          node --check pages-preview/app.js
          cp google-apps-script/Code.gs /tmp/bonsung-code.js
          node --check /tmp/bonsung-code.js

      - name: Build Next.js static site
        run: pnpm build:pages

      - name: Verify operating surfaces
        run: pnpm verify:surfaces

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/codex/v1-intranet'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
