name: Deploy Version.3 UI

on:
  push:
    branches:
      - main
      - codex/v1-intranet
      - codex/role-dashboards
  pull_request:
    branches:
      - codex/v1-intranet
  workflow_dispatch:
    inputs:
      server_url:
        description: "Optional external HTTPS Version.3 server URL to verify and connect"
        required: false
        type: string
        default: ""
      save_verified_server_url:
        description: "Save server_url as VERSION3_API_BASE_URL after verification"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Verify cleanup boundaries
        run: pnpm verify:version3-cleanup

      - name: Verify Version.3 release configuration
        if: github.event_name != 'pull_request' && (vars.VERSION3_API_BASE_URL != '' || inputs.server_url != '') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/codex/v1-intranet')
        env:
          VERSION3_API_BASE_URL: ${{ inputs.server_url || vars.VERSION3_API_BASE_URL }}
          NEXT_PUBLIC_ENABLE_APPS_SCRIPT_TRANSITION: ${{ vars.ENABLE_APPS_SCRIPT_TRANSITION }}
          VERSION3_RELEASE_ALLOW_TRANSITION_FLAGS: ${{ vars.VERSION3_RELEASE_ALLOW_TRANSITION_FLAGS }}
        run: pnpm verify:version3-release

      - name: Build Next.js static site
        env:
          NEXT_PUBLIC_VERSION3_API_BASE_URL: ${{ inputs.server_url || vars.VERSION3_API_BASE_URL }}
          NEXT_PUBLIC_ENABLE_APPS_SCRIPT_TRANSITION: ${{ vars.ENABLE_APPS_SCRIPT_TRANSITION }}
        run: pnpm build:pages

      - name: Verify Version.3 server contract
        if: vars.VERSION3_API_BASE_URL != '' || inputs.server_url != ''
        env:
          VERSION3_SERVER_VERIFY_BASE_URL: ${{ inputs.server_url || vars.VERSION3_API_BASE_URL }}
        run: pnpm verify:version3-server

      - name: Save verified Version.3 server URL
        if: github.event_name == 'workflow_dispatch' && inputs.server_url != '' && inputs.save_verified_server_url
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION3_API_BASE_URL: ${{ inputs.server_url }}
        run: gh variable set VERSION3_API_BASE_URL --repo "$GITHUB_REPOSITORY" --body "$VERSION3_API_BASE_URL"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/codex/v1-intranet'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
