name: 세부 기능 설정 조정 및 개선
description: 권한, 데이터 항목, 필터, 개인화, 운영 설정 등 기능 동작 변경
title: "[기능설정] "
labels: ["area:feature-settings", "priority:normal"]
body:
  - type: textarea
    id: request
    attributes:
      label: 요청 내용
      description: 조정하거나 개선할 기능 설정을 적어주세요.
      placeholder: 예) 강사 계정의 수강생 상세 노출 항목을 더 제한해주세요.
    validations:
      required: true
  - type: dropdown
    id: affected-role
    attributes:
      label: 주요 영향 권한
      options:
        - 대표
        - 매니저
        - 강사
        - 수강생
        - 전체
  - type: textarea
    id: data
    attributes:
      label: 관련 데이터
      description: Version.3 서버 엔티티, 계정/권한 설정, 전환 보조 Apps Script 데이터 등 관련 데이터를 적어주세요.
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 변경 후 화면과 데이터가 어떻게 동작해야 하는지 적어주세요.
  - type: checkboxes
    id: verification
    attributes:
      label: 검증 요청
      options:
        - label: Version.3 서버 계약과 운영 API 영향을 확인해주세요.
        - label: Preview 점검 모드가 필요한 경우 전환 플래그 기준도 확인해주세요.
        - label: 권한별 접근 제한을 확인해주세요.
