services:
  - type: web
    name: bonsung-stage-server
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: stage-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BONSUNG_SERVER_HOST
        value: 0.0.0.0
      - key: BONSUNG_LOCAL_DATA_FILE
        value: /data/stage-data.json
      - key: BONSUNG_SESSION_TTL_HOURS
        value: 12
      - key: BONSUNG_ALLOWED_ORIGINS
        sync: false
      - key: BONSUNG_LOCAL_SERVER_PASSWORD
        sync: false
      - key: BONSUNG_OWNER_INITIAL_PASSWORD
        sync: false
